name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., v1.2.3)'
        required: true
        type: string
      prerelease:
        description: 'Mark as pre-release'
        type: boolean
        default: false
      quick:
        description: 'Skip multi-OS / multi-Python matrix (faster, lower coverage)'
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ── Job 1: Resolve version (from tag OR dispatch input) ─────────────
  resolve:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.v.outputs.version }}
      prerelease: ${{ steps.v.outputs.prerelease }}
    steps:
      - id: v
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
            echo "prerelease=${{ inputs.prerelease }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi

  # ── Job 2: Validate via the reusable workflow ───────────────────────
  validate:
    needs: resolve
    uses: ./.github/workflows/reusable-validate.yml
    with:
      python-versions: ${{ (github.event_name == 'workflow_dispatch' && inputs.quick) && '["3.11"]' || '["3.10","3.11","3.12"]' }}
      os-list: ${{ (github.event_name == 'workflow_dispatch' && inputs.quick) && '["ubuntu-latest"]' || '["ubuntu-latest","windows-latest","macos-latest"]' }}

  # ── Job 3: Build distribution ───────────────────────────────────────
  build:
    needs: [resolve, validate]
    runs-on: ubuntu-latest
    steps:
      - uses: ./.github/actions/setup-python-project

      - name: Build wheel + sdist
        shell: bash
        run: |
          pip install build
          python -m build

      - name: Upload dist artifact
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08  # v4.6.0
        with:
          name: dist-${{ needs.resolve.outputs.version }}
          path: dist/
          retention-days: 30

  # ── Job 4: Publish GitHub Release ───────────────────────────────────
  publish:
    needs: [resolve, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download dist
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16  # v4.1.8
        with:
          name: dist-${{ needs.resolve.outputs.version }}
          path: dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@c95fe1489396fe8a9eb87c0abf8aa5b2ef267fda  # v2.2.1
        with:
          tag_name: ${{ needs.resolve.outputs.version }}
          name: Release ${{ needs.resolve.outputs.version }}
          generate_release_notes: true
          prerelease: ${{ needs.resolve.outputs.prerelease == 'true' }}
          files: dist/*
