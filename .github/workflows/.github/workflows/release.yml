name: Release

on:
  push:
    tags:
      - "v*"
      
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., v1.2.3)'
        required: true
        type: string
      prerelease:
        description: 'Is this a prerelease?'
        required: false
        default: false
        type: boolean

permissions:
  contents: write   # required for creating releases

jobs:
    
  # ── Job 1: Resolve version (from tag OR dispatch input) ─────────────
  resolve:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.v.outputs.version }}
    steps:
      - id: v
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

  # ── Job 2: Validate via the reusable workflow ───────────────────────
  validate:
    needs: resolve
    uses: ./.github/workflows/reusable-validate.yml
    with:
      python-versions: '["3.10","3.11","3.12"]'  # TODO ⑦: Pass this string
    # TODO ⑧: Call the reusable workflow from Part B,
    #         passing python-versions: '["3.10","3.11","3.12"]'.

  # ── Job 3: Build distribution ───────────────────────────────────────
  build:
    needs: [resolve, validate]
    runs-on: ubuntu-latest
    steps:
      - uses: ./.github/actions/setup-python-project  
        with:
             python-version: "3.11"       

      - name: Build wheel + sdist
        run: |
          pip install build
          python -m build

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  # ── Job 4: Publish GitHub Release ───────────────────────────────────
  publish:
    needs: [resolve, build]
    runs-on: ubuntu-latest
    steps:
      - name: Download dist
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
            tag_name: ${{ inputs.version }}
            name: Release ${{ inputs.version }}
            generate_release_notes: true                # auto-generate from PR titles
            prerelease: ${{ inputs.prerelease }}        # honor the dispatch input
            files: dist/*                               # attach build artifacts