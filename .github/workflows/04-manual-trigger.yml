name: "04 · Manual Trigger (workflow_dispatch)"

# Demonstrates workflow_dispatch with typed inputs.
# Trigger from the UI: Actions → select this workflow → Run workflow
# Trigger from CLI:
#   gh workflow run 04-manual-trigger.yml \
#     --field environment=staging \
#     --field dry-run=true \
#     --field version=v1.2.3

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        type: choice
        options:
          - staging
          - production
      version:
        description: "Version to deploy (e.g. v1.2.3)"
        required: true
        type: string
      dry-run:
        description: "Dry run — print actions without deploying"
        type: boolean
        default: true
      notify-team:
        description: "Send Slack notification after deploy"
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  validate:
    name: Validate inputs
    runs-on: ubuntu-latest
    steps:
      - name: Print inputs
        run: |
          echo "Environment : ${{ inputs.environment }}"
          echo "Version     : ${{ inputs.version }}"
          echo "Dry run     : ${{ inputs.dry-run }}"
          echo "Notify team : ${{ inputs.notify-team }}"

      - name: Validate version format
        run: |
          if [[ ! "${{ inputs.version }}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Version must follow vX.Y.Z format (got: ${{ inputs.version }})"
            exit 1
          fi
          echo "Version format is valid."

  deploy:
    name: Deploy → ${{ inputs.environment }}
    needs: validate
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Deploy
        run: |
          if [ "${{ inputs.dry-run }}" = "true" ]; then
            echo "::notice::DRY RUN — no changes will be made"
            echo "Would deploy ${{ inputs.version }} to ${{ inputs.environment }}"
          else
            echo "Deploying ${{ inputs.version }} to ${{ inputs.environment }}..."
            # ./scripts/deploy.sh ${{ inputs.environment }} ${{ inputs.version }}
          fi

      - name: Post summary
        run: |
          {
            echo "## Manual Deployment"
            echo ""
            echo "| Field | Value |"
            echo "|-------|-------|"
            echo "| Environment | \`${{ inputs.environment }}\` |"
            echo "| Version | \`${{ inputs.version }}\` |"
            echo "| Dry run | ${{ inputs.dry-run }} |"
            echo "| Triggered by | @${{ github.actor }} |"
          } >> $GITHUB_STEP_SUMMARY

  notify:
    name: Notify team
    needs: deploy
    if: inputs.notify-team == true
    runs-on: ubuntu-latest
    steps:
      - name: Send notification
        run: echo "Sending Slack notification for ${{ inputs.version }} → ${{ inputs.environment }}"
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL }}
