name: "03 · Reusable Deploy"

# This is a REUSABLE workflow — it can be called from other workflows.
# It is not triggered by push/pull_request; only by workflow_call.

on:
  workflow_call:
    inputs:
      environment:
        description: "Target environment (staging or production)"
        required: true
        type: string
      version:
        description: "Version tag to deploy"
        required: true
        type: string
      dry-run:
        description: "Dry run — log actions but do not deploy"
        required: false
        type: boolean
        default: false

    secrets:
      DEPLOY_TOKEN:
        description: "Deployment authentication token"
        required: true

    outputs:
      deploy-url:
        description: "URL of the deployed environment"
        value: ${{ jobs.deploy.outputs.deploy-url }}

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy → ${{ inputs.environment }}
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    timeout-minutes: 15

    outputs:
      deploy-url: ${{ steps.deploy.outputs.url }}

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Download artifact
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16  # v4.1.8
        with:
          name: dist-${{ inputs.version }}
          path: dist/

      - name: Deploy
        id: deploy
        run: |
          if [ "${{ inputs.dry-run }}" = "true" ]; then
            echo "DRY RUN — would deploy ${{ inputs.version }} to ${{ inputs.environment }}"
            echo "url=https://${{ inputs.environment }}.example.com" >> $GITHUB_OUTPUT
          else
            echo "Deploying ${{ inputs.version }} to ${{ inputs.environment }}..."
            # Real deploy command would go here
            echo "url=https://${{ inputs.environment }}.example.com" >> $GITHUB_OUTPUT
          fi
        env:
          DEPLOY_TOKEN: ${{ secrets.DEPLOY_TOKEN }}

      - name: Post deployment summary
        run: |
          echo "## Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "- **Environment:** ${{ inputs.environment }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Version:** ${{ inputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Dry run:** ${{ inputs.dry-run }}" >> $GITHUB_STEP_SUMMARY
          echo "- **URL:** ${{ steps.deploy.outputs.url }}" >> $GITHUB_STEP_SUMMARY
