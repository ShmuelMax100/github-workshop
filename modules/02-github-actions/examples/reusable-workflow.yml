name: "Example — Reusable Workflow Caller"

# This workflow CALLS the reusable workflow defined at:
# .github/workflows/03-reusable-workflow.yml
#
# Pattern: CI builds the artifact, then calls the reusable deploy workflow
# for each target environment.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # ── Build the artifact first ───────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.tag }}

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Set up Python
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b  # v5.3.0
        with:
          python-version: "3.11"

      - name: Generate version
        id: version
        run: echo "tag=v$(date +%Y%m%d)-${{ github.run_number }}" >> $GITHUB_OUTPUT

      - name: Build
        run: |
          pip install build
          python -m build

      - name: Upload artifact
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08  # v4.6.0
        with:
          name: dist-${{ steps.version.outputs.tag }}
          path: dist/

  # ── Call reusable workflow: staging ───────────────────────────────────────
  deploy-staging:
    name: Deploy → Staging
    needs: build
    uses: ./.github/workflows/03-reusable-workflow.yml    # relative path (same repo)
    with:
      environment: staging
      version: ${{ needs.build.outputs.version }}
      dry-run: false
    secrets:
      DEPLOY_TOKEN: ${{ secrets.STAGING_DEPLOY_TOKEN }}

  # ── Call reusable workflow: production ────────────────────────────────────
  deploy-production:
    name: Deploy → Production
    needs: deploy-staging
    uses: ./.github/workflows/03-reusable-workflow.yml
    with:
      environment: production
      version: ${{ needs.build.outputs.version }}
      dry-run: false
    secrets:
      DEPLOY_TOKEN: ${{ secrets.PROD_DEPLOY_TOKEN }}

