name: "02 · Matrix Build"

# Demonstrates matrix strategy for cross-platform, multi-version testing.

on:
  workflow_dispatch:
  push:
    paths:
      - "src/**"
      - ".github/workflows/02-matrix-build.yml"

permissions:
  contents: read

jobs:
  test-matrix:
    name: Test / ${{ matrix.os }} / Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false       # Let all matrix jobs finish even if one fails
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12"]

        # Exclude specific combinations
        exclude:
          - os: macos-latest
            python-version: "3.10"

        # Add extra variables to specific combinations
        include:
          - os: ubuntu-latest
            python-version: "3.12"
            coverage: true         # Only run coverage on this combination

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip (Unix)
        if: runner.os != 'Windows'
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest src/ -v

      - name: Run tests with coverage
        if: matrix.coverage == true
        run: |
          pip install pytest-cov
          pytest src/ --cov=src --cov-report=xml

      - name: Upload coverage
        if: matrix.coverage == true
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
